user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── 로그 형식 ───────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── 기본 최적화 ─────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types      text/plain text/css application/json application/javascript
                  text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # ── 보안 헤더 (전역) ────────────────────────────────────
  add_header X-Frame-Options        "SAMEORIGIN"  always;
  add_header X-Content-Type-Options "nosniff"     always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  server_tokens off;

  # ── Rate Limit 존 정의 ──────────────────────────────────
  # IP별 요청 속도 제한 (10r/s = 초당 10요청까지 허용, 버스트 50)
  limit_req_zone $binary_remote_addr zone=api:10m    rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=3r/m;

  # ── 업스트림 (Node.js API 서버) ─────────────────────────
  upstream api_server {
    server aistock_server:4000;
    keepalive 16;
  }

  # ── HTTP → HTTPS 리다이렉트 (HTTPS 사용 시 활성화) ──────
  # server {
  #   listen 80;
  #   server_name aistock.app www.aistock.app;
  #   return 301 https://$host$request_uri;
  # }

  # ── 메인 서버 블록 ───────────────────────────────────────
  server {
    listen 80;
    # HTTPS 사용 시:
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    server_name _;  # 모든 호스트 (도메인 확정 후 변경)

    client_max_body_size 5m;

    # ── /api/* → Node.js 백엔드 ──────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;

      proxy_pass         http://api_server;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade     $http_upgrade;
      proxy_set_header   Connection  "upgrade";
      proxy_set_header   Host        $host;
      proxy_set_header   X-Real-IP   $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;

      # 버퍼링 비활성화 (실시간 응답)
      proxy_buffering off;
    }

    # ── /api/auth/* → 더 엄격한 제한 ──────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api_server;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── /health → 헬스체크 (Rate Limit 제외) ──────────────
    location /health {
      proxy_pass http://api_server;
      access_log off;
    }

    # ── 정적 파일 (React 빌드) ────────────────────────────
    location / {
      root  /usr/share/nginx/html;
      index index.html;

      # SPA 라우팅: 파일이 없으면 index.html 반환
      try_files $uri $uri/ /index.html;

      # JS/CSS/이미지: 브라우저 캐시 1년
      location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      # index.html: 캐시 없음 (항상 최신 버전)
      location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }
  }
}
