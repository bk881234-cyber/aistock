<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- candlestick chart icon -->
  <g fill="none" stroke="white" stroke-width="28" stroke-linecap="round">
    <!-- bars -->
    <line x1="128" y1="160" x2="128" y2="352"/>
    <line x1="256" y1="200" x2="256" y2="340"/>
    <line x1="384" y1="140" x2="384" y2="300"/>
    <!-- candle bodies -->
    <rect x="104" y="200" width="48" height="80" fill="white" stroke="none" rx="6"/>
    <rect x="232" y="240" width="48" height="60" fill="#E84040" stroke="none" rx="6"/>
    <rect x="360" y="170" width="48" height="90" fill="white" stroke="none" rx="6"/>
  </g>
  <!-- AI text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="72" fill="rgba(255,255,255,0.9)">AI</text>
</svg>
