version: '3.9'

# 사용법:
#   docker compose -f docker-compose.prod.yml up -d --build

services:

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aistock_postgres
    restart: always                         # 운영: unless-stopped → always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # 초기 SQL (선택)
    # 운영에서는 포트 외부 노출 금지 (Nginx/App 내부 네트워크만 접근)
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aistock_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - internal
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 300m

  # ── Node.js API 서버 ─────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aistock_server
    restart: always
    env_file: .env.production              # 운영 환경 변수 파일
    environment:
      NODE_ENV:    production
      DB_HOST:     postgres
      REDIS_HOST:  redis
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - server_logs:/app/logs              # 로그 영속화
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # ── Nginx (리버스 프록시 + React 정적 파일) ──────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: aistock_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"                          # HTTPS 사용 시
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro     # 빌드 결과물
      - nginx_logs:/var/log/nginx
      # HTTPS 인증서 (Let's Encrypt 사용 시):
      # - /etc/letsencrypt:/etc/nginx/ssl:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout:  5s
      retries:  3
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  internal:
    driver: bridge
    # 외부 접근 차단: Nginx만 포트 바인딩, 나머지는 internal 네트워크만 통신

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  server_logs:
    driver: local
  nginx_logs:
    driver: local
